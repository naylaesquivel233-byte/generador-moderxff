<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GENERADOR DE MODERXFF</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
background:linear-gradient(180deg,#010b22,#02153d,#000);
color:white;
}

/* Fondo galaxia */
body::before{
content:"";
position:fixed;
width:250%;
height:250%;
background:
radial-gradient(circle,#1da1ff22 1px,transparent 1px),
radial-gradient(circle,#00bfff22 2px,transparent 2px),
radial-gradient(circle,#4fc3ff33 3px,transparent 3px);
background-size:80px 80px,120px 120px,180px 180px;
animation:stars 40s linear infinite;
z-index:-2;
}

body::after{
content:"";
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 30%,#00bfff55,transparent 35%),
radial-gradient(circle at 80% 70%,#0044ff55,transparent 35%);
filter:blur(60px);
z-index:-1;
}

@keyframes stars{
from{transform:translateY(0);}
to{transform:translateY(-400px);}
}

.card{
width:95%;
max-width:420px;
padding:25px;
border-radius:25px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.2);
box-shadow:0 0 30px #00bfff55;
}

h1{
text-align:center;
font-size:28px;
color:#7fdcff;
text-shadow:0 0 15px #00bfff;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:12px;
outline:none;
background:#ffffff15;
color:white;
font-size:16px;
margin-bottom:18px;
}

input::placeholder{
color:#ddd;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-bottom:20px;
}

.option{
padding:14px;
border:none;
border-radius:12px;
background:#0d2d55;
color:white;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.option.active{
background:#00aaff;
box-shadow:0 0 15px #00bfff;
}

.generate{
width:100%;
padding:16px;
font-size:20px;
font-weight:bold;
border:none;
border-radius:15px;
background:#00bfff;
color:white;
cursor:pointer;
box-shadow:0 0 20px #00bfff;
transition:.3s;
}

.generate:hover{
transform:scale(1.03);
}

.loader{
display:none;
text-align:center;
margin-top:20px;
font-size:18px;
}

.results{
display:none;
margin-top:20px;
background:#ffffff10;
padding:15px;
border-radius:15px;
}

.results h2{
text-align:center;
margin-bottom:10px;
color:#7fdcff;
}

.results p{
padding:7px 0;
border-bottom:1px solid rgba(255,255,255,.1);
}

footer{
margin-top:20px;
text-align:center;
color:#7fdcff;
font-weight:bold;
font-size:18px;
}
</style>
</head>

<body>

<div class="card">

<h1>GENERADOR DE MODERXFF</h1>

<input id="modelo" placeholder="Escribe el modelo de tu teléfono">

<div class="grid">
<button class="option">Sin DPI</button>
<button class="option">Con DPI</button>
<button class="option">ALTA</button>
<button class="option">BAJA</button>
</div>

<button class="generate" onclick="generar()">
GENERAR
</button>

<div class="loader" id="loader">
⏳ Generando sensibilidad...
</div>

<div class="results" id="resultado">
<h2>RESULTADOS</h2>

<p><b>General:</b> <span id="g"></span></p>
<p><b>Punto Rojo:</b> <span id="r"></span></p>
<p><b>Mira 2x:</b> <span id="m2"></span></p>
<p><b>Mira 4x:</b> <span id="m4"></span></p>
<p><b>Francotirador (AWM):</b> <span id="awm"></span></p>
<p><b>Mira Libre:</b> <span id="ml"></span></p>
<p><b>Tamaño del Botón:</b> <span id="tb"></span></p>

</div>

<footer>MODEXS</footer>

</div>

<script>

document.querySelectorAll(".option").forEach(btn=>{
btn.onclick=()=>{
btn.classList.toggle("active");
}
});

function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min;
}

function generar(){

if(document.getElementById("modelo").value==""){
alert("Escribe el modelo de tu teléfono");
return;
}

document.getElementById("resultado").style.display="none";
document.getElementById("loader").style.display="block";

setTimeout(()=>{

document.getElementById("loader").style.display="none";
document.getElementById("resultado").style.display="block";

document.getElementById("g").innerHTML=rand(150,200);
document.getElementById("r").innerHTML=rand(80,100);
document.getElementById("m2").innerHTML=rand(70,95);
document.getElementById("m4").innerHTML=rand(60,90);
document.getElementById("awm").innerHTML=rand(10,40);
document.getElementById("ml").innerHTML=rand(50,90);
document.getElementById("tb").innerHTML=rand(40,60)+"%";

},5000);

}

</script>

</body>
</html>
